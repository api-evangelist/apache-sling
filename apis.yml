apis:
  - aid: apache-sling:apache-sling-resource-api
    name: Apache Sling Resource API
    description: >-
      The Sling Resource API provides RESTful access to JCR content repository nodes via
      HTTP. Every content node is addressable as a URL, supporting GET, POST, PUT, DELETE,
      and MOVE operations through the Sling Default GET/POST Servlets. Content is accessible
      in multiple formats via selector and extension: .json for structured data, .xml for
      XML export, .infinity.json for deep tree traversal, and .tidy.json for formatted output.
      The POST Servlet (SlingPostServlet) handles content creation, modification, deletion,
      move, copy, and import operations.
    humanURL: https://sling.apache.org/documentation/the-sling-engine/resources.html
    tags:
      - REST
      - JCR
      - Content Management
      - Resources
      - Java
    properties:
      - type: Documentation
        url: https://sling.apache.org/documentation/the-sling-engine/resources.html
      - type: Documentation
        url: https://sling.apache.org/documentation/bundles/manipulating-content-the-slingpostservlet-servlets-post.html

  - aid: apache-sling:apache-sling-scripting-api
    name: Apache Sling Scripting API
    description: >-
      The Sling Scripting API enables server-side rendering through multiple scripting engines.
      Scripts are resolved from the content repository based on resource type and selectors,
      supporting HTL (HTML Template Language / Sightly), JSP (JavaServer Pages), Groovy,
      FreeMarker, Thymeleaf, and server-side JavaScript via Rhino. The ScriptEngine API
      allows integration of any JSR-223 compatible scripting language.
    humanURL: https://sling.apache.org/documentation/bundles/scripting.html
    tags:
      - Scripting
      - HTL
      - JSP
      - Groovy
      - Templates
      - Java
    properties:
      - type: Documentation
        url: https://sling.apache.org/documentation/bundles/scripting.html
      - type: Documentation
        url: https://sling.apache.org/documentation/bundles/scripting/scripting-htl.html

  - aid: apache-sling:apache-sling-event-api
    name: Apache Sling Event API
    description: >-
      The Sling Event API provides a job processing and eventing system built on OSGi EventAdmin.
      It supports distributed job queuing, scheduled job execution, event broadcasting across
      cluster nodes, and workflow triggering. The JobManager API enables job creation, monitoring,
      and management through a programmatic interface and also provides REST endpoints via the
      Web Console integration.
    humanURL: https://sling.apache.org/documentation/bundles/apache-sling-eventing-and-job-handling.html
    tags:
      - Events
      - Jobs
      - Async
      - OSGi
      - Workflow
    properties:
      - type: Documentation
        url: https://sling.apache.org/documentation/bundles/apache-sling-eventing-and-job-handling.html

