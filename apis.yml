aid: apache-sling
name: Apache Sling
description: >-
  Apache Sling is a RESTful web framework built on top of the Java Content Repository (JCR)
  standard. It maps HTTP requests to content resources using a resource-oriented URL decomposition
  model and uses scripts or servlets to render responses, supporting multiple scripting languages
  including HTL, JSP, Groovy, and server-side JavaScript. Apache Sling forms the foundation of
  Adobe Experience Manager (AEM) and is an Apache Software Foundation project with 300+ modular
  OSGi bundles.
type: Index
position: Consumer
access: 3rd-Party
